<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NerdAxe Collector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f9fafb;
            max-width: 720px;
            margin: 60px auto;
            padding: 24px;
        }

        .card {
            background: #1f2937;
            border-radius: 14px;
            padding: 28px;
        }

        h1 {
            margin-top: 0;
        }

        .status {
            color: #4ade80;
            font-weight: bold;
        }

        code {
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>NerdAxe Collector</h1>

        <p class="status">Serviço instalado no Umbrel</p>

        <p>
            Coleta dados do NerdAxe Gamma e da tomada Tapo P110
            e envia as métricas ao InfluxDB.
        </p>

        <p>
            Dashboard: <code>NerdAxe Analytics V4.2</code>
        </p>

        <p>
            Os logs operacionais podem ser consultados pelo Docker.
        </p>
    </div>
</body>
</html>
