services:
  app_proxy:
    environment:
      APP_HOST: nerdaxe-collector_web_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  collector:
    image: ghcr.io/zeluis51/nerdaxe-collector:1.0.0
    restart: on-failure
    env_file:
      - ${APP_DATA_DIR}/data/.env

  web:
    image: nginx:1.27-alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/status.html:/usr/share/nginx/html/index.html:ro
