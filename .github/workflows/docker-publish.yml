name: Publicar NerdAxe Collector

on:
  push:
    branches:
      - master
    paths:
      - "nerdaxe-collector/Dockerfile"
      - "nerdaxe-collector/requirements.txt"
      - "nerdaxe-collector/nerdaxe_collector.py"
      - "nerdaxe-collector/status.html"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Obter repositório
        uses: actions/checkout@v4

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticar no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nerdaxe-collector
          tags: |
            type=raw,value=1.0.0
            type=raw,value=latest

      - name: Construir e publicar
        uses: docker/build-push-action@v6
        with:
          context: ./nerdaxe-collector
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
